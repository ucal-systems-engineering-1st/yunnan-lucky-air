name: Deploy — GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare site files
        run: |
          mkdir -p dist
          cp index.html dist/
          cp main.js    dist/
          cp index.js   dist/
          [ -d assets       ] && cp -r assets       dist/
          [ -d data         ] && cp -r data         dist/
          [ -d shared       ] && cp -r shared       dist/
          [ -d auth         ] && cp -r auth         dist/
          [ -d community    ] && cp -r community    dist/
          [ -d corporate    ] && cp -r corporate    dist/
          [ -d self-service ] && cp -r self-service dist/
          [ -d students     ] && cp -r students     dist/
          touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
